]<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타자 게임</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body { font-family: Arial; text-align:center; background:#f0f4f8; }
.card {
  background:white;
  padding:20px;
  margin:20px auto;
  width:300px;
  border-radius:10px;
}
input,button { width:100%; margin:5px 0; padding:8px; }
</style>
</head>

<body>

<h1>타자 게임</h1>

<div class="card">
  <div id="game">게임 시작</div>
  <input id="input" disabled>

  <button onclick="startGame()">게임 시작</button>
  <div id="result"></div>
</div>

<div class="card">
  <input id="name" placeholder="닉네임">

  <!-- 🔥 캡차 -->
  <div id="captchaBox" style="display:none;">
    <div class="g-recaptcha"
      data-sitekey="6LcEAKYsAAAAAJ7zew0wLpS2ha5JfKLX846LVkoK">
    </div>
  </div>

  <button onclick="submitScore()">점수 제출</button>
</div>

<script>
let words=["사과","바나나","컴퓨터","학교"];
let current;
let startTime;
let speeds=[];
let count=0;

// 게임 시작
function startGame(){
  speeds=[];
  count=0;
  document.getElementById("input").disabled=false;
  next();
}

// 다음 단어
function next(){
  if(count>=3){ endGame(); return; }

  current=words[Math.floor(Math.random()*words.length)];
  document.getElementById("game").innerText=current;
  document.getElementById("input").value="";
  startTime=Date.now();
  count++;
}

// 입력
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    if(e.target.value===current){
      let t=(Date.now()-startTime)/1000;
      speeds.push(current.length/t);
      next();
    } else {
      alert("틀림");
      e.target.value="";
    }
  }
});

// 게임 종료
function endGame(){
  document.getElementById("input").disabled=true;

  let avg=(speeds.reduce((a,b)=>a+b,0)/speeds.length).toFixed(2);
  document.getElementById("result").innerText="속도: "+avg;

  // 🔥 여기서 캡차 보이게
  document.getElementById("captchaBox").style.display="block";
}

// 제출
async function submitScore(){

  let token=grecaptcha.getResponse();

  if(!token){
    alert("로봇 확인 먼저!");
    return;
  }

  let name=document.getElementById("name").value;
  let score=document.getElementById("result").innerText.match(/[\d.]+/)[0];

  let res=await fetch("/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      token,
      nickname:name,
      score:parseFloat(score)
    })
  });

  let data=await res.json();

  if(data.ok){
    alert("성공!");
  }else{
    alert("실패");
  }

  // 🔥 무조건 마지막에 reset
  grecaptcha.reset();
}
</script>

</body>
</html>
